<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>JBE TopSpin</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0b1120;--card:#182230;--card2:#233048;--card3:#2d3f5c;
      --text:#e8edf5;--dim:#8899b4;--muted:#5a6d8a;
      --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;
      --surface-hard:#3b82f6;--surface-clay:#e9724c;--surface-grass:#22c55e;
      --radius:14px;--pad:14px;--shadow:0 2px 12px rgba(0,0,0,0.25);
      --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
      --nav-h:64px;
    }
    html{height:100%;overflow:hidden}
    body{
      font-family:var(--font);background:var(--bg);color:var(--text);
      height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;
      -webkit-font-smoothing:antialiased;
      padding-bottom:calc(var(--nav-h) + 48px);
    }
    /* ── Header ── */
    .header{
      background:linear-gradient(180deg,#1a2a45 0%,#182230 100%);
      padding:16px var(--pad) 12px;position:sticky;top:0;z-index:20;
      display:flex;justify-content:space-between;align-items:center;
    }
    .header-left{display:flex;flex-direction:column;gap:1px}
    .header .title{font-size:17px;font-weight:800;letter-spacing:-0.4px}
    .header .title span{color:var(--green)}
    .header .date{font-size:11px;color:var(--dim);font-weight:500}
    .header-right{display:flex;align-items:center;gap:10px}
    .header-update{font-size:10px;color:var(--muted)}
    .help-btn,.refresh-btn{
      width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      background:var(--card2);color:var(--dim);font-size:15px;font-weight:700;
      transition:all 0.2s;user-select:none;-webkit-tap-highlight-color:transparent;
    }
    .help-btn:hover,.refresh-btn:hover{background:var(--card3);color:var(--text)}
    .help-btn:active,.refresh-btn:active{transform:scale(0.92)}
    /* ── API Alert ── */
    .api-alert{
      background:#1c1602;border:1px solid #5c4804;color:#fbbf24;
      padding:10px 14px;font-size:12px;text-align:center;display:none;line-height:1.4;
    }
    /* ── Bottom Navigation ── */
    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;z-index:50;
      background:var(--card);border-top:1px solid var(--card2);
      display:flex;padding:4px 6px calc(4px + env(safe-area-inset-bottom,0px));
      height:var(--nav-h);
    }
    .nav-item{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:2px;padding:6px 2px;border-radius:10px;border:none;background:transparent;
      cursor:pointer;color:var(--muted);font-size:10px;font-weight:600;
      transition:all 0.2s;user-select:none;-webkit-tap-highlight-color:transparent;
    }
    .nav-item .nav-icon{font-size:20px;line-height:1}
    .nav-item.active{color:var(--green);background:rgba(34,197,94,0.1)}
    .nav-item:not(.active):hover{color:var(--dim)}
    /* ── Stats per pagina ── */
    .page-stats{
      display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
      padding:10px var(--pad);
    }
    .stat-card{
      background:var(--card);border-radius:var(--radius);padding:10px 4px;
      text-align:center;
    }
    .stat-card .val{font-size:18px;font-weight:700;line-height:1.2}
    .stat-card .val.green{color:var(--green)}
    .stat-card .val.red{color:var(--red)}
    .stat-card .val.amber{color:var(--amber)}
    .stat-card .val.gray{color:var(--dim)}
    .stat-card .lbl{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.3px;font-weight:600}
    /* ── Content Panels ── */
    .panel{display:none}
    .panel.active{display:block}
    /* ── Day Header ── */
    .day-header{
      display:flex;align-items:center;gap:8px;
      padding:16px var(--pad) 8px;font-size:13px;font-weight:700;
      color:var(--dim);text-transform:uppercase;letter-spacing:0.6px;
    }
    .day-header::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--card2),transparent)}
    .day-header .count{
      font-size:11px;font-weight:600;color:var(--muted);background:var(--card);
      padding:2px 8px;border-radius:10px;margin-left:auto;
    }
    /* ── Match Cards ── */
    .match-list{padding:0 var(--pad);display:flex;flex-direction:column;gap:12px}
    .match-card{
      background:var(--card);border-radius:var(--radius);overflow:hidden;
      box-shadow:var(--shadow);position:relative;
    }
    .mc-accent{height:3px;width:100%;position:absolute;top:0;left:0}
    .mc-accent.green{background:linear-gradient(90deg,var(--green),rgba(34,197,94,0.3))}
    .mc-accent.red{background:linear-gradient(90deg,var(--red),rgba(239,68,68,0.3))}
    .mc-accent.gray{background:linear-gradient(90deg,var(--muted),transparent)}
    .mc-dot{
      position:absolute;top:12px;right:12px;
      width:10px;height:10px;border-radius:50%;z-index:2;
      box-shadow:0 0 8px rgba(0,0,0,0.4);
    }
    .mc-dot.green{background:var(--green)}
    .mc-dot.red{background:var(--red)}
    .mc-dot.gray{background:var(--muted)}
    .mc-top{padding:16px 16px 0}
    .mc-meta{
      display:flex;align-items:center;gap:6px;
      font-size:11px;color:var(--dim);flex-wrap:wrap;margin-bottom:2px;
    }
    .mc-meta .surface-badge{
      font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;letter-spacing:0.3px;
    }
    .surface-badge.hard{background:rgba(59,130,246,0.15);color:var(--surface-hard)}
    .surface-badge.clay{background:rgba(233,114,76,0.15);color:var(--surface-clay)}
    .surface-badge.grass{background:rgba(34,197,94,0.15);color:var(--surface-grass)}
    .surface-badge.carpet{background:rgba(139,92,246,0.15);color:#8b5cf6}
    .mc-meta .label{color:var(--muted)}
    .mc-meta .sep{color:var(--card3);font-size:8px}
    .rank-badge{
      font-size:10px;color:var(--muted);background:var(--card2);
      padding:1px 6px;border-radius:4px;font-weight:600;display:inline-block;
    }
    .mc-players{
      padding:14px 16px 10px;display:flex;align-items:center;gap:0;
    }
    .mc-player{flex:1;display:flex;flex-direction:column}
    .mc-player.left{align-items:flex-start;text-align:left}
    .mc-player.right{align-items:flex-end;text-align:right}
    .mc-player .name{font-size:16px;font-weight:700;line-height:1.3}
    .mc-player .country-row{
      font-size:12px;color:var(--dim);margin-top:2px;display:flex;align-items:center;gap:4px;
    }
    .mc-player.left .country-row{flex-direction:row}
    .mc-player.right .country-row{flex-direction:row-reverse}
    .mc-vs{
      font-size:12px;font-weight:600;color:var(--muted);
      background:var(--card2);width:32px;height:32px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
      margin:0 8px;
    }
    .mc-bottom{
      padding:10px 16px 14px;
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;
      border-top:1px solid rgba(255,255,255,0.04);
    }
    .mc-time{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:4px}
    .mc-analysis{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:3px}
    /* ── Value Bet Cards (Match style) ── */
    .bet-list{padding:0 var(--pad);display:flex;flex-direction:column;gap:12px}
    .bet-card{
      background:var(--card);border-radius:var(--radius);overflow:hidden;
      box-shadow:var(--shadow);position:relative;
    }
    /* Selection area */
    .bet-selection-block{
      padding:0 16px 4px;text-align:center;
    }
    .bet-pick{
      display:inline-flex;align-items:center;gap:8px;
      background:var(--card2);padding:6px 14px;border-radius:8px;
      font-size:14px;font-weight:700;
    }
    .bet-pick .pick-text{color:var(--green)}
    .bet-pick .pick-odds{color:var(--dim);font-weight:600}
    .bet-pick .pick-odds em{font-style:normal;color:var(--text);font-weight:700}
    /* Details grid */
    .bet-details-block{
      padding:0 16px 12px;
      display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;
    }
    .bet-detail{
      display:flex;align-items:center;justify-content:space-between;
      font-size:12px;padding:3px 0;
    }
    .bet-detail .bd-label{color:var(--dim)}
    .bet-detail .bd-value{font-weight:600;display:flex;align-items:center;gap:3px}
    .bd-value .bd-icon{font-size:11px;line-height:1}
    .bd-highlight{color:var(--green);font-weight:700}
    .bd-market{color:var(--blue)}
    /* Info button + panel */
    .bet-info-toggle{
      display:flex;align-items:center;gap:4px;padding:8px 16px 12px;
      border-top:1px solid rgba(255,255,255,0.04);cursor:pointer;
      user-select:none;-webkit-tap-highlight-color:transparent;
      transition:background 0.2s;border-radius:0 0 var(--radius) var(--radius);
    }
    .bet-info-toggle:active{background:rgba(255,255,255,0.03)}
    .bet-info-toggle .info-icon{
      width:20px;height:20px;border-radius:50%;background:var(--card2);
      display:flex;align-items:center;justify-content:center;
      font-size:11px;font-weight:700;color:var(--dim);flex-shrink:0;
    }
    .bet-info-toggle .info-trigger{font-size:11px;color:var(--dim);font-weight:500}
    .bet-info-toggle .info-arrow{font-size:10px;color:var(--muted);margin-left:auto;transition:transform 0.25s}
    .bet-info-toggle.open .info-arrow{transform:rotate(180deg)}
    .bet-info-body{
      overflow:hidden;max-height:0;transition:max-height 0.35s ease, padding 0.3s ease;
      padding:0 16px;background:var(--card2);border-radius:0 0 var(--radius) var(--radius);
    }
    .bet-info-body.open{
      max-height:300px;padding:12px 16px;
    }
    .bet-info-body .explain{font-size:12px;line-height:1.5;color:var(--dim)}
    .bet-info-body .explain strong{color:var(--text)}
    .bet-info-body .explain .hl{color:var(--green);font-weight:600}
    .bet-info-body .metric-bar{
      display:flex;gap:6px;margin-top:8px;align-items:center;
    }
    .bet-info-body .metric-bar .bar{
      flex:1;height:6px;background:var(--card3);border-radius:3px;overflow:hidden;
    }
    .bet-info-body .metric-bar .bar-fill{
      height:100%;border-radius:3px;transition:width 0.5s;
    }
    /* ── Help Modal ── */
    .help-overlay{
      position:fixed;top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.6);z-index:1000;
      display:flex;align-items:center;justify-content:center;
      padding:20px;backdrop-filter:blur(4px);
    }
    .help-modal{
      background:var(--card);border-radius:18px;max-width:420px;width:100%;
      max-height:80vh;overflow-y:auto;
      box-shadow:0 25px 80px rgba(0,0,0,0.6);
      animation:helpIn 0.25s ease;
    }
    @keyframes helpIn{from{opacity:0;transform:translateY(20px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    .help-header{
      display:flex;justify-content:space-between;align-items:center;
      padding:18px 20px 14px;
    }
    .help-header h2{font-size:17px;font-weight:700}
    .help-close{
      width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;
      background:var(--card2);color:var(--dim);font-size:16px;font-weight:700;
      display:flex;align-items:center;justify-content:center;transition:0.2s;
    }
    .help-close:hover{background:var(--card3);color:var(--text)}
    .help-body{padding:0 20px 20px;font-size:13px;line-height:1.6;color:var(--dim)}
    .help-body p{margin:0 0 12px}
    .help-body ul{margin:0 0 12px;padding-left:18px}
    .help-body li{margin-bottom:6px}
    .help-body strong{color:var(--text)}
    .help-body .hl{color:var(--green);font-weight:600}
    .help-body .tag{
      display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;
      border-radius:4px;margin:0 2px;
    }
    .help-body .tag.green{background:rgba(34,197,94,0.15);color:var(--green)}
    .help-body .tag.red{background:rgba(239,68,68,0.15);color:var(--red)}
    .help-body .tag.gray{background:rgba(136,153,180,0.15);color:var(--dim)}
    /* ── Other ── */
    .empty{text-align:center;padding:50px 20px;color:var(--dim);font-size:14px}
    .loading{text-align:center;padding:50px}
    .spinner{width:30px;height:30px;border:3px solid var(--card2);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .no-matches{text-align:center;padding:50px 20px;color:var(--dim)}
    .no-matches .icon{font-size:48px;margin-bottom:12px;opacity:0.5}
    .no-matches p{font-size:14px;line-height:1.5}
    .elo-list{padding:0 var(--pad)}
    .elo-row{display:flex;align-items:center;gap:10px;background:var(--card);padding:10px var(--pad);border-bottom:1px solid var(--bg)}
    .elo-row:first-child{border-radius:var(--radius) var(--radius) 0 0}
    .elo-row:last-child{border-radius:0 0 var(--radius) var(--radius);border-bottom:none}
    .elo-rank{font-size:14px;font-weight:700;color:var(--dim);min-width:28px}
    .elo-rank.top3{color:var(--amber)}
    .elo-name{flex:1;font-weight:600}
    /* ── Report / Log Cards ── */
    .report-box{padding:0 var(--pad);display:flex;flex-direction:column;gap:8px}
    .log-card{
      background:var(--card);border-radius:var(--radius);overflow:hidden;
      box-shadow:var(--shadow);position:relative;display:flex;
    }
    .log-accent{width:3px;position:absolute;top:0;bottom:0;left:0}
    .log-dot{
      position:absolute;top:12px;right:12px;
      width:8px;height:8px;border-radius:50%;z-index:2;
    }
    .log-body{flex:1;padding:12px 16px;min-width:0}
    .log-top{
      display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;
    }
    .log-time{font-size:11px;color:var(--dim);font-weight:600}
    .log-badge{
      font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:0.5px;
    }
    .log-title{font-size:14px;font-weight:700;line-height:1.3;color:var(--text)}
    .log-desc{font-size:12px;color:var(--dim);margin-top:4px;line-height:1.4}
    .log-info{
      font-size:11px;color:var(--muted);margin-top:8px;padding-top:6px;
      border-top:1px solid rgba(255,255,255,0.05);
    }
    .log-info-line{padding:2px 0;line-height:1.5}
    .log-info-line:first-child{padding-top:0}
    /* ── Sub-tabs (WALLET) ── */
    .sub-tabs{
      display:flex;margin:10px var(--pad);gap:4px;
      background:var(--card);border-radius:var(--radius);padding:4px;
    }
    .sub-tab{
      flex:1;text-align:center;padding:9px 4px;border-radius:9px;
      font-size:13px;font-weight:600;color:var(--dim);cursor:pointer;
      transition:all 0.2s;user-select:none;border:none;background:transparent;
      -webkit-tap-highlight-color:transparent;
    }
    .sub-tab.active{background:var(--green);color:#0b1120}
    .sub-tab:not(.active):hover{color:var(--text)}
    .sub-panel{display:none}
    .sub-panel.active{display:block}
    /* ── Statistiche cards ── */
    .stats-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:8px;
      padding:0 var(--pad);
    }
    .stats-card-lg{
      background:var(--card);border-radius:var(--radius);padding:14px;
      text-align:center;grid-column:span 2;
    }
    .stats-card-lg .val{font-size:24px;font-weight:800;line-height:1.2}
    .stats-card-lg .lbl{font-size:11px;color:var(--dim);margin-top:4px;text-transform:uppercase;letter-spacing:0.4px;font-weight:600}
    .stat-cell{
      background:var(--card);border-radius:var(--radius);padding:12px 8px;
      text-align:center;
    }
    .stat-cell .val{font-size:18px;font-weight:700;line-height:1.2}
    .stat-cell .val.green{color:var(--green)}
    .stat-cell .val.red{color:var(--red)}
    .stat-cell .val.amber{color:var(--amber)}
    .stat-cell .val.gray{color:var(--dim)}
    .stat-cell .lbl{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.3px;font-weight:600}
    /* ── Win/Loss bar ── */
    .wl-bar{display:flex;height:20px;border-radius:10px;overflow:hidden;margin:10px var(--pad) 4px}
    .wl-bar .w{background:var(--green);transition:width 0.5s}
    .wl-bar .l{background:var(--red);transition:width 0.5s}
    .wl-bar .p{background:var(--muted);transition:width 0.5s}
    .wl-label{display:flex;justify-content:space-between;padding:0 var(--pad);font-size:10px;color:var(--dim);margin-bottom:8px}
    .wl-label .w{color:var(--green);font-weight:600}
    .wl-label .l{color:var(--red);font-weight:600}
    .wl-label .p{color:var(--muted);font-weight:600}
    .history-list{display:flex;flex-direction:column;gap:4px}
    .bottom-spacer{height:24px}
  </style>
</head>
<body>
  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="title">JBE <span>TopSpin</span></div>
      <div class="date" id="dateDisplay"></div>
    </div>
    <div class="header-right">
      <span class="header-update" id="lastUpdate"></span>
      <button class="help-btn" onclick="showHelp()" title="Aiuto" aria-label="Aiuto">?</button>
      <button class="refresh-btn" onclick="loadData()" title="Aggiorna" aria-label="Aggiorna">&#x21bb;</button>
    </div>
  </div>

  <div id="apiAlert" class="api-alert" style="display:none"></div>

  <!-- PAGE-LEVEL STATS (sostituisce i vecchi KPI) -->
  <div class="page-stats" id="pageStats" style="display:none"></div>

  <!-- CONTENT PANELS -->
  <div class="panel active" id="panel-matches">
    <div class="match-list" id="matchList"></div>
  </div>
  <div class="panel" id="panel-bets">
    <div id="betStats" style="margin:0;padding:0;width:100%"></div>
    <div class="bet-list" id="betList"></div>
  </div>
  <div class="panel" id="panel-history">
    <div class="sub-tabs">
      <button class="sub-tab active" data-sub="giocate">\u{1f3b1} Giocate</button>
      <button class="sub-tab" data-sub="statistiche">\u{1f4ca} Statistiche</button>
    </div>
    <div class="sub-panel active" id="sub-giocate">
      <div class="history-list" id="historyList"></div>
    </div>
    <div class="sub-panel" id="sub-statistiche">
      <div class="stats-grid" id="statsGrid"></div>
      <div style="padding:10px var(--pad) 0">
        <div style="background:var(--card);border-radius:var(--radius);padding:var(--pad)">
          <div style="font-size:13px;font-weight:600;margin-bottom:10px">\u{1f4c8} Bankroll Progress</div>
          <div id="historyChart"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="panel" id="panel-report">
    <div class="report-box" id="reportBox" style="padding:0 var(--pad);display:flex;flex-direction:column;gap:8px"></div>
  </div>

  <!-- HELP MODAL -->
  <div id="helpModal" class="help-overlay" style="display:none" onclick="hideHelp()">
    <div class="help-modal" onclick="event.stopPropagation()">
      <div class="help-header">
        <h2 id="helpTitle">Aiuto</h2>
        <button class="help-close" onclick="hideHelp()" aria-label="Chiudi">&times;</button>
      </div>
      <div class="help-body" id="helpBody"></div>
    </div>
  </div>

  <!-- BOTTOM NAVIGATION -->
  <div class="bottom-nav">
    <button class="nav-item active" data-tab="matches">
      <span class="nav-icon">&#x1f3be;</span>
      <span>Match</span>
    </button>
    <button class="nav-item" data-tab="bets">
      <span class="nav-icon">&#x1f48e;</span>
      <span>Value</span>
    </button>
    <button class="nav-item" data-tab="history">
      <span class="nav-icon">&#x1f4b0;</span>
      <span>Wallet</span>
    </button>
    <button class="nav-item" data-tab="report">
      <span class="nav-icon">&#x1f4cb;</span>
      <span>Report</span>
    </button>
  </div>

  <div class="bottom-spacer"></div>

  <script>
    const DATA_URL = "api/data.json";
    let data = null;

    // --- PWA ---
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }

    // --- Country -> Flag emoji ---
    function countryFlag(code) {
      if (!code || code.length !== 2) return "";
      const cp = code.toUpperCase().split("").map(c => 0x1F1E6 + c.charCodeAt(0) - 65);
      return String.fromCodePoint(...cp);
    }

    // --- Load ---
    function loadData() {
      document.querySelectorAll(".loading, .empty").forEach(e => e.remove());
      fetch(DATA_URL + "?t=" + Date.now())
        .then(r => r.json())
        .then(d => { data = d; render(); })
        .catch(err => {
          document.getElementById("matchList").innerHTML = '<div class="empty">&#x274c; Errore caricamento dati</div>';
          console.error(err);
        });
    }

    function render() {
      if (!data) return;
      const now = new Date();
      document.getElementById("dateDisplay").textContent = now.toLocaleDateString("it-IT", {
        weekday: "long", day: "numeric", month: "long", year: "numeric"
      });
      document.getElementById("lastUpdate").textContent = now.toLocaleTimeString("it-IT", {hour:"2-digit",minute:"2-digit"});
      renderApiAlert(data);
      renderMatches(data);
      renderBets(data);
      renderHistory(data);
      renderReport(data);
    }

    // --- API Alert ---
    function renderApiAlert(d) {
      const el = document.getElementById("apiAlert");
      if (!el) return;
      if (d.api_status?.exhausted) {
        el.style.display = "block";
        el.textContent = "\u26a0\ufe0f API odds esaurite \u2014 dati non aggiornati dal " + (d.api_status.since || "?") + ". Le chiavi si resettano il 1\u00b0 del mese.";
      } else { el.style.display = "none"; }
    }

    // ──────────────────────────────────────────────
    //  MATCH PAGE
    // ──────────────────────────────────────────────
    const SURFACE_LABEL = { "Hard": "Cemento", "Clay": "Terra", "Grass": "Erba", "Carpet": "Sintetico" };
    const SURFACE_BADGE = { "Hard": "hard", "Clay": "clay", "Grass": "grass", "Carpet": "carpet" };
    const SURFACE_ICON = { "Hard": "\u{1f7e6}", "Clay": "\u{1f7e7}", "Grass": "\u{1f7e9}", "Carpet": "\u{1f7ea}" };

    function renderMatches(d) {
      const all = (d.matches?.upcoming || []);
      if (!all.length) {
        document.getElementById("matchList").innerHTML = '<div class="no-matches"><div class="icon">&#x1f3be;</div><p>Nessun match in programma.</p></div>';
        return;
      }
      const byDate = {};
      all.forEach(m => { const d = m.date || "?"; if (!byDate[d]) byDate[d] = []; byDate[d].push(m); });
      const sortedDates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));
      // Usa data locale italiana (non UTC)
      const now = new Date();
      const todayStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
      let html = "";
      sortedDates.forEach(dateStr => {
        const isToday = dateStr === todayStr;
        const label = isToday ? "Oggi" : new Date(dateStr + "T12:00:00").toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "long" });
        html += `<div class="day-header"><span>${isToday ? '\u{1f3be}' : '\u{1f4c5}'} ${label}</span><span class="count">${byDate[dateStr].length} match</span></div>`;
        byDate[dateStr].sort((a, b) => {
          const tA = a.match_datetime || a.date + "T00:00";
          const tB = b.match_datetime || b.date + "T00:00";
          return tA.localeCompare(tB);
        });
        byDate[dateStr].forEach(m => {
          const p1 = m.players?.p1 || {}, p2 = m.players?.p2 || {};
          const dotClass = m.has_bet ? "green" : "red";
          const dotTitle = m.has_bet ? "Scommessa attiva" : "Nessuna scommessa";
          const surf = m.surface || "";
          const tLevel = m.tour_level || "";
          const round = m.round || "";
          const flag1 = countryFlag(p1.country), flag2 = countryFlag(p2.country);
          const rank1 = p1.rank ? `<span class="rank-badge">#${p1.rank}</span>` : "";
          const rank2 = p2.rank ? `<span class="rank-badge">#${p2.rank}</span>` : "";
          let dt = "";
          if (m.match_datetime) {
            try {
              const parts = m.match_datetime.split(/[\s\/:]/);
              if (parts.length >= 4) {
                const d = new Date(parts[2], parts[1]-1, parts[0], parts[3], parts[4]||0);
                dt = d.toLocaleDateString("it-IT",{day:"numeric",month:"short"})+" \u00b7 "+d.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
              } else { dt = m.match_datetime; }
            } catch(e) { dt = m.match_datetime; }
          } else if (m.date) {
            dt = new Date(m.date+"T12:00:00").toLocaleDateString("it-IT",{day:"numeric",month:"short"})+" \u00b7 --:--";
          }
          let analysis = "";
          if (m.analysis_time) {
            try { const at = new Date(m.analysis_time); analysis = at.toLocaleDateString("it-IT",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}); }
            catch(e) { analysis = String(m.analysis_time).slice(0,10); }
          }
          html += `
            <div class="match-card">
              <div class="mc-accent ${dotClass}"></div>
              <div class="mc-dot ${dotClass}" title="${dotTitle}"></div>
              <div class="mc-top">
                <div class="mc-meta">
                  ${surf ? `<span class="surface-badge ${SURFACE_BADGE[surf]||''}">${SURFACE_LABEL[surf]||surf}</span>` : ""}
                  <span>${m.tournament || "ATP"}</span>
                  ${tLevel ? `<span class="sep">\u00b7</span><span class="label">${tLevel}</span>` : ""}
                  ${round ? `<span class="sep">\u00b7</span><span>${round}</span>` : ""}
                </div>
              </div>
              <div class="mc-players">
                <div class="mc-player left">
                  <div class="name">${p1.name||"?"}</div>
                  <div class="country-row">${flag1}${p1.country||"N/A"} ${rank1}</div>
                </div>
                <div class="mc-vs">vs</div>
                <div class="mc-player right">
                  <div class="name">${p2.name||"?"}</div>
                  <div class="country-row">${rank2} ${p2.country||"N/A"}${flag2 ? " "+flag2 : ""}</div>
                </div>
              </div>
              <div class="mc-bottom">
                <span class="mc-time">\u{1f4c5} ${dt}</span>
                ${analysis ? `<span class="mc-analysis">\u{1f4a1} Analisi: ${analysis}</span>` : ""}
              </div>
            </div>`;
        });
      });
      document.getElementById("matchList").innerHTML = html;
    }

    // ──────────────────────────────────────────────
    //  VALUE BETS PAGE
    // ──────────────────────────────────────────────
    function renderBets(d) {
      const bets = d.value_bets || [];
      const el = document.getElementById("betList");
      const statsEl = document.getElementById("betStats");

      if (!bets.length) {
        el.innerHTML = '<div class="empty">Nessuna value bet al momento</div>';
        statsEl.innerHTML = "";
        return;
      }

      // Calcola stats
      const total = bets.length;
      const won = bets.filter(b => b.status === "won" || (b.resolved && b.result > 0)).length;
      const lost = bets.filter(b => b.status === "lost" || (b.resolved && b.result < 0)).length;
      const pending = bets.filter(b => b.status === "pending" || !b.resolved).length;
      const settled = won + lost;
      const winRate = settled > 0 ? Math.round(won / settled * 100) : 0;
      const settlePct = total > 0 ? Math.round((total - pending) / total * 100) : 0;

      statsEl.innerHTML = `
        <div class="page-stats" style="padding:10px var(--pad);margin:0">
          <div class="stat-card"><div class="val ${winRate >= 60 ? 'green' : winRate >= 40 ? 'amber' : 'red'}">${winRate}%</div><div class="lbl">Win Rate</div></div>
          <div class="stat-card"><div class="val green">${won}</div><div class="lbl">Vinte (${settled > 0 ? Math.round(won/settled*100) : 0}%)</div></div>
          <div class="stat-card"><div class="val red">${lost}</div><div class="lbl">Perse (${settled > 0 ? Math.round(lost/settled*100) : 0}%)</div></div>
          <div class="stat-card"><div class="val gray">${pending}</div><div class="lbl">In attesa</div></div>
        </div>
      `;

      // Raggruppa per data, dal futuro al passato
      const byDate = {};
      bets.forEach(b => {
        const d = b.match_date || "?";
        if (!byDate[d]) byDate[d] = [];
        byDate[d].push(b);
      });
      const sortedDates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));
      // Usa data locale italiana (non UTC)
      const now = new Date();
      const todayStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');

      const marketLabel = (b) => b.market_label || b.market || "";
      const marketEmoji = { "match_winner": "\u{1f3c6}", "game_handicap": "\u2696\ufe0f", "over_under": "\u{1f4ca}" };

      let html = "";
      sortedDates.forEach(dateStr => {
        const isToday = dateStr === todayStr;
        const label = isToday ? "Oggi" : new Date(dateStr+"T12:00:00").toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"});
        html += `<div class="day-header"><span>${isToday ? '\u{1f48e}' : '\u{1f4c5}'} ${label}</span><span class="count">${byDate[dateStr].length} scommesse</span></div>`;

        // Ordina per edge decrescente dentro la stessa data
        byDate[dateStr].sort((a, b) => (b.edge||0) - (a.edge||0));

        byDate[dateStr].forEach(b => {
          const isPending = b.status === "pending" || !b.resolved;
          const isWon = b.status === "won" || (b.resolved && b.result > 0);
          const isLost = b.status === "lost" || (b.resolved && b.result < 0);
          const statClass = isWon ? "green" : isLost ? "red" : "gray";
          const statLabel = isWon ? "Vinta" : isLost ? "Persa" : "In corso";

          const modelPct = Math.round((b.model_prob||0) * 100);
          const edgePct = b.edge_pct != null ? b.edge_pct : (b.edge ? Math.round(b.edge * 100) : 0);
          const stakeStr = b.stake ? b.stake.toFixed(2) : "";
          const conf = b.confidence || "";
          const marketEm = marketEmoji[b.market] || "\u{1f3b1}";

          // Calcola probabilità implicita del mercato (1/odds)
          const marketImplied = b.odds > 0 ? Math.round((1 / b.odds) * 100) : 0;
          const diffPct = modelPct - marketImplied; // quanto il modello è più confidente

          let dt = b.match_datetime || b.match_date || "";
          if (b.match_datetime) {
            try {
              const parts = b.match_datetime.split(/[\s\/:]/);
              if (parts.length >= 4) {
                const d = new Date(parts[2], parts[1]-1, parts[0], parts[3], parts[4]||0);
                dt = d.toLocaleDateString("it-IT",{day:"numeric",month:"short"})+" \u00b7 "+d.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
              }
            } catch(e) {}
          }

          const surf = b.surface || "";
          const tournament = b.tournament || "ATP";

          // Spiegazione "perché"
          let whyParts = [];
          const isHighEdge = edgePct >= 30;
          const isHighModel = modelPct >= 70;
          const isPosDiff = diffPct > 0;

          if (isHighEdge) {
            whyParts.push(`Edge del <strong>+${edgePct}%</strong> \u2014 molto alto rispetto alla quota`);
          } else {
            whyParts.push(`Edge positivo del <strong>+${edgePct}%</strong>`);
          }
          if (isHighModel) {
            whyParts.push(`Modello al <strong>${modelPct}%</strong>, molto sopra la quota di mercato (${marketImplied}%)`);
          } else {
            whyParts.push(`Modello al <strong>${modelPct}%</strong> vs mercato ${marketImplied}%`);
          }
          if (conf === "HIGH") {
            whyParts.push(`Confidenza <strong>alta</strong> sulla previsione`);
          }
          if (isPosDiff) {
            whyParts.push(`Differenza di <span class="hl">+${diffPct}%</span> tra modello e mercato`);
          }

          const edgeBarPct = Math.min(edgePct, 100);
          const modelBarPct = Math.min(modelPct, 100);
          const marketBarPct = Math.min(marketImplied, 100);

          const infoId = "bi_" + (b.id || Math.random().toString(36).slice(2,8));

          // Badge confidenza
          const confBadge = conf === "HIGH" ? `<span style="font-size:10px;background:rgba(34,197,94,0.15);color:var(--green);padding:1px 7px;border-radius:4px;font-weight:600">HIGH</span>`
            : conf === "MEDIUM" ? `<span style="font-size:10px;background:rgba(245,158,11,0.15);color:var(--amber);padding:1px 7px;border-radius:4px;font-weight:600">MEDIUM</span>`
            : `<span style="font-size:10px;color:var(--muted)">${conf||'-'}</span>`;

          html += `
            <div class="bet-card">
              <div class="mc-accent ${statClass}"></div>
              <div class="mc-dot ${statClass}" title="${statLabel}"></div>

              <!-- Riga 1: Superficie · Torneo · Stato -->
              <div class="mc-top">
                <div class="mc-meta">
                  ${surf ? `<span class="surface-badge ${SURFACE_BADGE[surf]||''}">${SURFACE_LABEL[surf]||surf}</span>` : ""}
                  <span>${tournament}</span>
                  <span class="sep">\u00b7</span>
                  <span class="label">${statLabel}</span>
                </div>
              </div>

              <!-- Riga 2: Giocatori -->
              <div class="mc-players" style="padding:10px 16px 4px">
                <div class="mc-player left">
                  <div class="name" style="font-size:15px">${b.player1||"?"}</div>
                </div>
                <div class="mc-vs">vs</div>
                <div class="mc-player right">
                  <div class="name" style="font-size:15px">${b.player2||"?"}</div>
                </div>
              </div>

              <!-- Riga 3: Giocata in evidenza -->
              <div class="bet-selection-block" style="padding:4px 16px 10px">
                <div class="bet-pick">
                  <span class="pick-text">${b.selection || b.selection_raw || "?"}</span>
                  <span class="pick-odds">@ <em>${b.odds?.toFixed(2) || "?"}</em></span>
                </div>
              </div>

              <!-- Riga 4: Metriche principali (2x2 grid) -->
              <div style="padding:0 16px 8px;display:grid;grid-template-columns:1fr 1fr;gap:6px">
                <!-- Modello -->
                <div style="background:var(--card2);border-radius:8px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between">
                  <span style="font-size:11px;color:var(--dim)">\u{1f4ca} Modello</span>
                  <span style="font-size:16px;font-weight:700;color:var(--blue)">${modelPct}%</span>
                </div>
                <!-- Edge -->
                <div style="background:var(--card2);border-radius:8px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between">
                  <span style="font-size:11px;color:var(--dim)">\u{1f4cf} Edge</span>
                  <span style="font-size:16px;font-weight:700;color:var(--green)">+${edgePct}%</span>
                </div>
                <!-- Stake -->
                <div style="background:var(--card2);border-radius:8px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between">
                  <span style="font-size:11px;color:var(--dim)">\u{1f4b0} Stake</span>
                  <span style="font-size:14px;font-weight:700">\u20ac${stakeStr}</span>
                </div>
                <!-- Confidenza -->
                <div style="background:var(--card2);border-radius:8px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between">
                  <span style="font-size:11px;color:var(--dim)">\u{1f3af} Confidenza</span>
                  <span style="font-size:13px;font-weight:700">${confBadge}</span>
                </div>
              </div>

              <!-- Riga 5: Dettagli compatti -->
              <div style="padding:0 16px 10px;display:flex;flex-wrap:wrap;gap:4px 12px;font-size:11px;color:var(--dim)">
                ${dt ? `<span>\u{1f4c5} ${dt}</span>` : ""}
                <span>${marketEm} ${marketLabel(b)}</span>
                ${b.bookmaker ? `<span>\u{1f3e6} ${b.bookmaker}</span>` : ""}
              </div>

              <!-- Riga 6: Info toggle -->
              <div class="bet-info-toggle" onclick="toggleBetInfo('${infoId}')">
                <span class="info-icon">i</span>
                <span class="info-trigger">Perch\u00e9 \u00e8 una buona giocata</span>
                <span class="info-arrow">\u25bc</span>
              </div>

              <!-- Riga 7: Info body -->
              <div class="bet-info-body" id="${infoId}">
                <div class="explain">
                  <p>${whyParts.join(". ")}.</p>

                  <!-- Confronto Modello vs Mercato + Edge -->
                  <div style="margin:10px 0 6px;font-size:11px;color:var(--dim);font-weight:600">\u{1f4ca} Probabilit\u00e0 a confronto</div>
                  
                  <div class="metric-bar">
                    <span style="font-size:10px;min-width:60px;">Modello</span>
                    <div class="bar"><div class="bar-fill" style="width:${modelBarPct}%;background:var(--blue)"></div></div>
                    <span style="font-size:11px;min-width:40px;text-align:right;color:var(--blue);font-weight:700">${modelPct}%</span>
                  </div>
                  <div class="metric-bar">
                    <span style="font-size:10px;min-width:60px;">Mercato</span>
                    <div class="bar"><div class="bar-fill" style="width:${marketBarPct}%;background:var(--dim);opacity:0.5"></div></div>
                    <span style="font-size:11px;min-width:40px;text-align:right;color:var(--dim);font-weight:600">${marketImplied}%</span>
                  </div>
                  <div class="metric-bar">
                    <span style="font-size:10px;min-width:60px;">Edge</span>
                    <div class="bar"><div class="bar-fill" style="width:${edgeBarPct}%;background:var(--green)"></div></div>
                    <span style="font-size:11px;min-width:40px;text-align:right;color:var(--green);font-weight:700">+${edgePct}%</span>
                  </div>

                  ${diffPct > 0 ? `<div style="margin-top:8px;font-size:11px;color:var(--dim);background:rgba(34,197,94,0.08);border-radius:6px;padding:6px 10px;text-align:center">
                    Il modello \u00e8 pi\u00f9 confidente del bookmaker del <strong style="color:var(--green)">+${diffPct}%</strong>
                  </div>` : ""}
                </div>
              </div>
            </div>`;
        });
      });
      el.innerHTML = html;
    }

    function toggleBetInfo(id) {
      const body = document.getElementById(id);
      if (!body) return;
      const toggler = body.previousElementSibling;
      body.classList.toggle("open");
      toggler.classList.toggle("open");
    }

    // ──────────────────────────────────────────────
    //  WALLET PAGE
    // ──────────────────────────────────────────────
    function renderHistory(d) {
      const allBets = d.value_bets || [];
      const bets = allBets.filter(b => b.status !== 'pending');
      const bh = d.bankroll_history || [];
      const b = d.bankroll || {};
      const activeSub = document.querySelector(".sub-tab.active")?.dataset?.sub || "giocate";

      // --- GIOVATE ---
      if (!bets.length) {
        document.getElementById("historyList").innerHTML = '<div class="empty">\u{1f4dc} Nessuna scommessa ancora</div>';
      } else {
        const grouped = {};
        bets.forEach(b => { const d = b.date; if (!grouped[d]) grouped[d] = []; grouped[d].push(b); });
        let html = "";
        Object.entries(grouped).forEach(([date, dayBets]) => {
          const dayPnl = dayBets.reduce((s, b) => s + (b.profit||0), 0);
          const dayWins = dayBets.filter(b => b.status === "won").length;
          const dayLoss = dayBets.filter(b => b.status === "lost").length;
          html += `<div style="font-size:12px;color:var(--dim);font-weight:600;padding:10px var(--pad) 4px;text-transform:uppercase;letter-spacing:0.5px">
            \u{1f4c5} ${date} \u00b7 ${dayWins}W ${dayLoss}L \u00b7 <span style="color:${dayPnl >= 0 ? 'var(--green)' : 'var(--red)'}">${dayPnl >= 0 ? '+' : ''}\u20ac${dayPnl.toFixed(2)}</span>
          </div>`;
          dayBets.forEach(b => {
            const profitClass = b.status === "won" ? "won" : b.status === "lost" ? "lost" : "push";
            const edgePct = (b.edge * 100).toFixed(1);
            const modelPct = (b.model_prob * 100).toFixed(0);
            const stakeStr = b.stake ? `\u20ac${b.stake.toFixed(2)}` : "";
            const profitStr = b.profit !== null ? (b.profit > 0 ? "+" : "") + b.profit.toFixed(2) : "";
            html += `
              <div class="bet-card" style="margin-bottom:6px">
                <div class="mc-accent ${profitClass}"></div>
                <div style="padding:10px 14px 0;display:flex;justify-content:space-between;align-items:center">
                  <span style="font-size:12px;font-weight:600">${b.player1} vs ${b.player2}</span>
                  <span style="font-size:10px;font-weight:600;color:${profitClass === 'won' ? 'var(--green)' : profitClass === 'lost' ? 'var(--red)' : 'var(--amber)'}">${b.status}</span>
                </div>
                <div style="font-size:12px;padding:4px 10px;margin:6px 14px;display:inline-block;background:var(--card2);border-radius:6px;font-weight:700">
                  ${b.selection} <span style="font-weight:400;color:var(--dim)">@${b.odds?.toFixed(2)}</span>
                </div>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);padding:0 14px 8px;gap:2px">
                  <div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 4px"><span style="color:var(--dim)">Mod</span><span style="font-weight:600">${modelPct}%</span></div>
                  <div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 4px"><span style="color:var(--dim)">Edge</span><span style="font-weight:600;color:var(--green)">+${edgePct}%</span></div>
                  <div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 4px"><span style="color:var(--dim)">Stake</span><span style="font-weight:600">${stakeStr}</span></div>
                </div>
                <div style="text-align:center;font-size:14px;font-weight:700;padding:6px 14px 10px;color:${profitClass === 'won' ? 'var(--green)' : profitClass === 'lost' ? 'var(--red)' : 'var(--amber)'};background:rgba(255,255,255,0.03)">
                  ${profitStr ? (profitStr.startsWith('+') ? '+' : '') + profitStr : ""}
                </div>
              </div>`;
          });
        });
        document.getElementById("historyList").innerHTML = html;
      }

      // --- STATISTICHE ---
      const total = bets.length;
      const won = bets.filter(b => b.status === "won").length;
      const lost = bets.filter(b => b.status === "lost").length;
      const push = bets.filter(b => b.status === "push" || (b.status !== "won" && b.status !== "lost")).length;
      const settled = won + lost;
      const winRate = settled > 0 ? Math.round(won / settled * 100) : 0;
      const totalPnl = bets.reduce((s, b) => s + (b.profit || 0), 0);
      const totalStaked = bets.reduce((s, b) => s + (b.stake || 0), 0);
      const roi = totalStaked > 0 ? ((totalPnl / totalStaked) * 100).toFixed(1) : "0.0";
      const avgEdge = bets.length > 0 ? (bets.reduce((s, b) => s + (b.edge || 0), 0) / bets.length * 100).toFixed(1) : "0.0";
      const bestBet = bets.reduce((best, b) => (b.profit || 0) > (best?.profit || 0) ? b : best, null);
      const worstBet = bets.reduce((worst, b) => (b.profit || 0) < (worst?.profit || 0) ? b : worst, null);

      // Calcola percentuali W/L/P
      const wPct = total > 0 ? (won / total * 100).toFixed(0) : 0;
      const lPct = total > 0 ? (lost / total * 100).toFixed(0) : 0;
      const pPct = total > 0 ? (push / total * 100).toFixed(0) : 0;

      let statsHtml = `
        <div class="stats-card-lg">
          <div class="val ${totalPnl >= 0 ? 'green' : 'red'}">${totalPnl >= 0 ? '+' : ''}\u20ac${totalPnl.toFixed(2)}</div>
          <div class="lbl">P&amp;L Totale</div>
        </div>
        <div class="stat-cell"><div class="val ${winRate >= 60 ? 'green' : winRate >= 40 ? 'amber' : 'red'}">${winRate}%</div><div class="lbl">Win Rate</div></div>
        <div class="stat-cell"><div class="val gray">${total}</div><div class="lbl">Scommesse</div></div>
        <div class="stat-cell"><div class="val ${roi >= 0 ? 'green' : 'red'}">${roi}%</div><div class="lbl">ROI</div></div>
        <div class="stat-cell"><div class="val">${totalStaked.toFixed(0)}</div><div class="lbl">Totale Puntato</div></div>
        <div class="stat-cell"><div class="val green">${won}</div><div class="lbl">Vinte (${wPct}%)</div></div>
        <div class="stat-cell"><div class="val red">${lost}</div><div class="lbl">Perse (${lPct}%)</div></div>
        <div class="stat-cell"><div class="val" style="color:var(--green)">+${avgEdge}%</div><div class="lbl">Edge Medio</div></div>
        <div class="stat-cell"><div class="val gray">${push}</div><div class="lbl">In attesa (${pPct}%)</div></div>
      `;

      document.getElementById("statsGrid").innerHTML = statsHtml;

      // Win/Loss bar (solo risolte)
      const wlTotal = won + lost;
      const wlW = wlTotal > 0 ? (won / wlTotal * 100).toFixed(0) : 0;
      const wlL = wlTotal > 0 ? (lost / wlTotal * 100).toFixed(0) : 0;
      const wlBar = `
        <div class="wl-bar">
          <div class="w" style="width:${wlW}%"></div>
          <div class="l" style="width:${wlL}%"></div>
        </div>
        <div class="wl-label">
          <span class="w">\u2713 ${won} vinte (${wlW}%)</span>
          <span class="l">\u2717 ${lost} perse (${wlL}%)</span>
        </div>
      `;

      // Miglior e peggior bet
      let bestHtml = "";
      if (bestBet && bestBet.profit > 0) {
        bestHtml = `
          <div class="stats-card-lg">
            <div style="font-size:11px;color:var(--dim);margin-bottom:6px">\u{1f3c6} Miglior Giocata</div>
            <div style="font-size:14px;font-weight:600">${bestBet.player1} vs ${bestBet.player2}</div>
            <div style="font-size:12px;color:var(--dim);margin-top:2px">${bestBet.selection} @${bestBet.odds?.toFixed(2)}</div>
            <div class="val green" style="font-size:20px;margin-top:6px">+\u20ac${bestBet.profit.toFixed(2)}</div>
          </div>`;
      }
      if (worstBet && worstBet.profit < 0) {
        bestHtml += `
          <div class="stats-card-lg">
            <div style="font-size:11px;color:var(--dim);margin-bottom:6px">\u{1f4a5} Peggior Giocata</div>
            <div style="font-size:14px;font-weight:600">${worstBet.player1} vs ${worstBet.player2}</div>
            <div style="font-size:12px;color:var(--dim);margin-top:2px">${worstBet.selection} @${worstBet.odds?.toFixed(2)}</div>
            <div class="val red" style="font-size:20px;margin-top:6px">-\u20ac${Math.abs(worstBet.profit).toFixed(2)}</div>
          </div>`;
      }

      if (bestHtml) {
        document.getElementById("statsGrid").innerHTML += bestHtml;
      }

      // Bankroll chart (sempre renderizzato per la sub-tab statistiche)
      let chartHtml = "";
      if (bh.length > 0) {
        const maxVal = Math.max(...bh.map(d => d.bankroll), 200);
        const minVal = Math.min(...bh.map(d => d.bankroll), 200);
        const range = maxVal - minVal || 1;
        bh.forEach(day => {
          const pct = ((day.bankroll - minVal) / range * 100).toFixed(0);
          const barColor = day.pnl >= 0 ? "var(--green)" : "var(--red)";
          chartHtml += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:11px">
            <span style="min-width:62px;color:var(--dim)">${day.date.slice(5)}</span>
            <div style="flex:1;height:16px;background:var(--card2);border-radius:4px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${barColor};border-radius:4px;opacity:0.7"></div>
            </div>
            <span style="min-width:48px;text-align:right;font-weight:600;color:${barColor}">\u20ac${day.bankroll.toFixed(0)}</span>
          </div>`;
        });
      } else {
        chartHtml = '<div style="color:var(--dim);font-size:13px;text-align:center;padding:12px">\u20ac200.00 (bankroll iniziale)</div>';
      }
      document.getElementById("historyChart").innerHTML = chartHtml;

      // Aggiungi W/L bar dopo stats grid
      document.getElementById("statsGrid").insertAdjacentHTML("beforeend", `<div style="grid-column:span 2">${wlBar}</div>`);
    }

    // Sub-tab switching
    document.querySelectorAll(".sub-tab").forEach(tab => {
      tab.addEventListener("click", function() {
        document.querySelectorAll(".sub-tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".sub-panel").forEach(p => p.classList.remove("active"));
        this.classList.add("active");
        document.getElementById("sub-" + this.dataset.sub).classList.add("active");
        // Aggiorna contenuto se ci sono dati
        if (data) renderHistory(data);
      });
    });

    // ──────────────────────────────────────────────
    //  REPORT / LOG PAGE
    // ──────────────────────────────────────────────
    function renderReport(d) {
      const entries = d.log_entries || [];
      const el = document.getElementById("reportBox");

      if (!entries.length) {
        el.innerHTML = '<div class="empty">\u{1f4cb} Nessun log disponibile</div>';
        return;
      }

      // Raggruppa per data
      const byDate = {};
      entries.forEach(e => {
        const d = e.date || "?";
        if (!byDate[d]) byDate[d] = [];
        byDate[d].push(e);
      });
      const sortedDates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));
      const todayStr = new Date().toISOString().slice(0, 10);

      // Type style mapping
      const typeStyle = {
        "pipeline": { bg: "rgba(59,130,246,0.1)", color: "#60a5fa", dot: "#3b82f6" },
        "value_bet": { bg: "rgba(34,197,94,0.1)", color: "#22c55e", dot: "#22c55e" },
        "system": { bg: "rgba(245,158,11,0.1)", color: "#f59e0b", dot: "#f59e0b" },
        "error": { bg: "rgba(239,68,68,0.1)", color: "#ef4444", dot: "#ef4444" },
      };

      let html = "";
      sortedDates.forEach(dateStr => {
        const isToday = dateStr === todayStr;
        const label = isToday ? "Oggi" : new Date(dateStr+"T12:00:00").toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"});
        html += `<div class="day-header"><span>${isToday ? '\u{1f4cb}' : '\u{1f4c5}'} ${label}</span><span class="count">${byDate[dateStr].length} eventi</span></div>`;

        byDate[dateStr].forEach(e => {
          const ts = typeStyle[e.type] || typeStyle.system;
          const badgeLabel = e.type === "pipeline" ? "PIPELINE" : e.type === "value_bet" ? "VALUE BET" : "SISTEMA";

          html += `
            <div class="log-card">
              <div class="log-accent" style="background:${ts.dot}"></div>
              <div class="log-dot" style="background:${ts.dot}"></div>
              <div class="log-body">
                <div class="log-top">
                  <span class="log-time">${e.time || "--:--"}</span>
                  <span class="log-badge" style="background:${ts.bg};color:${ts.color}">${badgeLabel}</span>
                </div>
                <div class="log-title">${e.icon} ${e.title}</div>
                <div class="log-desc">${e.desc}</div>
                ${e.info ? `<div class="log-info">${e.info.split('\n').map(line => `<div class="log-info-line">\u{1f4a1} ${line}</div>`).join('')}</div>` : ""}
              </div>
            </div>`;
        });
      });

      el.innerHTML = html;
    }

    // ──────────────────────────────────────────────
    //  HELP SYSTEM + TAB SWITCHING
    // ──────────────────────────────────────────────
    const TAB_NAMES = { matches: "Match", bets: "Value", history: "Storico", report: "Report" };
    const HELP_TEXTS = {
      matches: `<p><strong>\u{1f3be} Match \u2014 Panoramica Partite</strong></p>
<p>Mostra <strong>tutti i match ATP in programma</strong> da oggi in poi, con o senza scommesse attive.</p>
<p><strong>Cosa trovi:</strong></p>
<ul>
  <li><span class="tag green">\u25cf</span> Pallino verde: abbiamo scommesse attive su questo match</li>
  <li><span class="tag red">\u25cf</span> Pallino rosso: nessuna scommessa su questo match</li>
  <li>Badge superficie: <span class="tag" style="background:rgba(59,130,246,0.15);color:#3b82f6">CEMENTO</span> <span class="tag" style="background:rgba(233,114,76,0.15);color:#e9724c">TERRA</span> <span class="tag" style="background:rgba(34,197,94,0.15);color:#22c55e">ERBA</span></li>
  <li>Torneo, livello e turno</li>
  <li>Giocatori con nazione e ranking ATP</li>
  <li>Data e ora partita (Italia)</li>
  <li>Timestamp analisi del modello</li>
</ul>
<p>Raggruppati per giornata, dal pi\u00f9 vicino al pi\u00f9 lontano. I match passati spariscono a mezzanotte.</p>`,

      bets: `<p><strong>\u{1f48e} Value \u2014 Scommesse Consigliate</strong></p>
<p>Le <strong>scommesse che il modello ritiene vantaggiose</strong> (expected value positivo).</p>
<p><strong>Cosa vedi:</strong></p>
<ul>
  <li><span class="tag green">\u25cf</span> <strong>Verde</strong>: scommessa vinta</li>
  <li><span class="tag gray">\u25cf</span> <strong>Grigio</strong>: in attesa di risultato</li>
  <li><span class="tag red">\u25cf</span> <strong>Rosso</strong>: scommessa persa</li>
  <li>Badge superficie e torneo</li>
  <li>Giocatori e tipo di giocata (es. "de Minaur vince")</li>
  <li>Quota @ del bookmaker</li>
  <li>Probabilit\u00e0 modello, Edge %, Stake, Confidenza</li>
  <li>Mercato (Vincitore, Handicap, Totale Game) e bookmaker</li>
  <li>Pulsante <strong>"Perch\u00e9 \u00e8 una buona giocata"</strong> con spiegazione e barre visive</li>
</ul>
<p>Raggruppate per data, dal futuro al passato. I numeri in alto mostrano quante scommesse sono state piazzate, vinte, perse e in attesa.</p>
<p><em>Nota: qui non viene indicato l'importo vinto o perso \u2014 quelle info sono nella sezione Storico.</em></p>`,

      history: `<p><strong>\u{1f4b0} Wallet \u2014 Portafoglio Scommesse</strong></p>
<p>La sezione Wallet \u00e8 divisa in due sottosezioni:</p>
<p><strong>\u{1f3b1} Giocate</strong></p>
<ul>
  <li>Elenco completo di tutte le scommesse risolte</li>
  <li>Ordinate per data con esito e profitto/perdita</li>
  <li>Ogni card mostra: selezione, quota, probabilit\u00e0 modello, edge, stake e risultato</li>
</ul>
<p><strong>\u{1f4ca} Statistiche</strong></p>
<ul>
  <li><strong>P&amp;L Totale</strong> \u2014 profitto o perdita complessiva</li>
  <li><strong>Win Rate</strong> \u2014 percentuale scommesse vinte sulle risolte</li>
  <li><strong>ROI</strong> \u2014 ritorno sull'investimento totale</li>
  <li><strong>Edge Medio</strong> \u2014 vantaggio medio del modello</li>
  <li><strong>Miglior/Peggior giocata</strong> \u2014 bet con profitto/perdita maggiore</li>
  <li><strong>Win/Loss bar</strong> \u2014 rapporto visivo vinte/perse</li>
  <li><strong>Bankroll Progress</strong> \u2014 grafico a barre giorno per giorno</li>
</ul>`,

      report: `<p><strong>\u{1f4cb} Report \u2014 Log di Sistema</strong></p>
<p>Cronologia degli eventi del sistema JBE TopSpin, organizzata per data.</p>
<p><strong>Tipi di eventi:</strong></p>
<ul>
  <li><span class="tag" style="background:rgba(59,130,246,0.15);color:#60a5fa">PIPELINE</span> \u2014 Esecuzione della pipeline: match analizzati, value bet trovate, API status</li>
  <li><span class="tag" style="background:rgba(34,197,94,0.15);color:var(--green)">VALUE BET</span> \u2014 Nuova value bet rilevata dal modello</li>
  <li><span class="tag" style="background:rgba(245,158,11,0.15);color:var(--amber)">SISTEMA</span> \u2014 Eventi di sistema (DB, errori, aggiornamenti)</li>
</ul>
<p>Ogni evento mostra ora, titolo e descrizione. I dati provengono dal log della pipeline e dal database delle scommesse.</p>`
    };

    function showHelp() {
      const activeTab = document.querySelector(".nav-item.active");
      const tabName = activeTab ? activeTab.dataset.tab : "matches";
      document.getElementById("helpTitle").textContent = TAB_NAMES[tabName] || "Aiuto";
      document.getElementById("helpBody").innerHTML = HELP_TEXTS[tabName] || "<p>Nessuna informazione disponibile.</p>";
      document.getElementById("helpModal").style.display = "flex";
    }

    function hideHelp() {
      document.getElementById("helpModal").style.display = "none";
    }

    // --- Tab switching (bottom nav) ---
    document.querySelectorAll(".nav-item").forEach(item => {
      item.addEventListener("click", function() {
        document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
        this.classList.add("active");
        document.getElementById("panel-" + this.dataset.tab).classList.add("active");

        // Page-level stats solo per tab che li hanno
        const statsEl = document.getElementById("pageStats");
        const tabName = this.dataset.tab;
        const showStats = ["bets"].includes(tabName);
        statsEl.style.display = showStats ? "grid" : "none";
      });
    });

    // --- Init ---
    loadData();
    document.getElementById("pageStats").style.display = "none";
    setInterval(loadData, 120000);
  </script>
</body>
</html>
